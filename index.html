se the result is not reliable."},{k:"step",a:"Engine",i:"Stabilize at established power ≥ 3 minutes"},{k:"step",a:"Record (avoid parallax)",i:"Torque (%), TOT (°C) — repeat for other engine"},{k:"step",a:"Chart limit TOT",i:"Obtain from Fig 5-1 (torque, PA, OAT)"},{k:"step",a:"ΔTOT",i:"Chart limit TOT − measured TOT"},{k:"note",t:"Acceptable when measured TOT ≤ chart limit TOT. If greater, repeat with 10% higher torque (if possible). If still failing in low/no wind, repeat in a hover with enough height."},{k:"warn",t:"When performing the power check at a hover and the online engine fails, both engines are considered inoperative — an emergency power-off landing shall be made."},{k:"step",a:"Results",i:"Record in the helicopter documents"}],notes:["Interval: at least every 100 flying hours (Category A: 50 hrs), or when abnormal engine function is suspected.","Max permissible ΔTOT change between two consecutive checks: 20 °C. Greater change → maintenance action.","Below −35 °C the cold weather kit 117-80020 shall be installed and operational.","Cross-ref: Training Manual — Power Plant (CH 6, p. 6-96…6-100)."]},{id:"inflight-power-check",cat:"powerchecks",group:"Power Assurance",title:"Inflight Power Check (TOT)",kind:"procedure",ref:{src:"FM",loc:"§5.6.4 · Fig 5-2 · p. 5-8…5-9",rev:"8"},topWarning:"Established for twin engine operation only. Performing the check single-engine (second engine in idle) will give incorrect results.",indications:["Twin-engine check, engines trimmed asymmetrically. Checks cruise power levels against the Section 5 charts — not a substitute for the ground check when one is required before flight."],blocks:[{k:"step",a:"Height above ground > 500 ft",i:"Attain (preferably minimum turbulence)"},{k:"step",a:"Steady level flight",i:"Establish — up to 8000 ft: 110 KIAS or max cruise or VNE−10, whichever is less; above 8000 ft: 90 KIAS or max cruise or VNE−10, whichever is less"},{k:"step",a:"Bleed air heating (engine to be checked)",i:"OFF"},{k:"ste -BK117-60-111)"},{k:"Gross mass ≤ 3000 kg",v:"15 000 ft"},{k:"Gross mass > 3000 kg",v:"10 000 ft  (12 000 ft if OAT < −30 °C)"},{k:"HIGE, takeoff & landing",v:"17 000 ft DA or 15 000 ft PA — whichever is less"},{head:"Max operating altitude — S/N 7253 & subsequent (or after S/B-MBB-BK117-60-111)"},{k:"Gross mass ≤ 3000 kg",v:"18 000 ft"},{k:"Gross mass > 3000 kg",v:"10 000 ft  (12 000 ft if OAT < −30 °C)"},{k:"HIGE, takeoff & landing",v:"17 000 ft DA or 18 000 ft PA — whichever is less"},{head:"All effectivities"},{k:"French-registered, JP-4 fuel",v:"7 000 ft"},{k:"Minimum air temperature",v:"−45 °C"},{k:"Maximum air temperature",v:"ISA + 35 °C (max +50 °C)"}],notes:["All altitudes are pressure altitude (PA) unless given as density altitude (DA).","Full envelope (varies with OAT & gross mass): Fig 2-3, p. 2-7. The high-altitude (hatched) area is permitted only with the High Altitude Kit (S/N 7253 & subsequent, or S/B-MBB-BK117-60-111 incorporated).","Pitot and static port heating ON when ambient temperature is below +4.5 °C and visible moisture is present.","Flight into icing conditions is prohibited; if entered unexpectedly, leave the icing zone the quickest possible way.","↗ Chart Analyst (Suite · §5): these altitude limits bound the §5 performance lookups (hover ceiling, height-velocity, power check). Confirm the planned altitude is within them before using the charts."]},{id:"wind-limits",cat:"limits",group:"Airspeed",title:"Sideward, Rearward & Crosswind Limits",kind:"keyvalue",ref:{src:"FM",loc:"§2.8.2 / §2.8.3 · p. 2-6",rev:"6"},pairs:[{head:"Sideward / rearward flight (demonstrated)"},{k:"DA ≤ 3000 ft",v:"up to 30 kt"},{k:"DA > 3000 ft",v:"up to 20 kt"},{head:"Crosswind — standard takeoff & landing (demonstrated)"},{k:"Crosswind component",v:"up to 17 kt"}],notes:["Sideward / crosswind-hover and rearward / tailwind-hover demonstrated to these speeds, by density altitude (DA).","17 kt is the demonstrated directional-controllability crosswind limit for standard takeoff and landing — see the Wind Component Chart (Section 1).","External-load operations have their own, more restrictive sideward limits — see the External Cargo Hook entry."]},{id:"ech-limits",cat:"supplements",group:"External Cargo Hook · FMS 10-2",title:"External Cargo Hook — Limits & Weights",kind:"keyvalue",ref:{src:"FM",loc:"FMS 10-2 §2 · p. 10-2-3…2-5",rev:"8"},pairs:[{k:"Max cargo hook load — assy 117-80101",v:"1200 kg"},{k:"Max cargo hook load — assy 117-80112",v:"1500 kg"},{k:"Max combined gross mass (helicopter + load)",v:"3500 kg"},{k:"Max airspeed — with external load",v:"100 kt"},{k:"Max airspeed — trailing unloaded hook",v:"70 kt"},{k:"Max demonstrated bank angle",v:"45°"},{k:"Sideward flight — right / left / rearward",v:"10 / 20 / 20 kt"},{k:"Point of load application (aft of datum)",v:"4385 mm"},{k:"Cargo hook assy mass",v:"14.32 kg"}],notes:["VFR “Class B rotorcraft/load combination”: the external load is jettisonable and is lifted free of land or water.","Attach the load only with a fixed ring of inner diameter 50–80 mm.","Flight with an empty net or unballasted sling is prohibited unless the operator's approved limits/procedures allow it.","Keep the distance between load and hook as short as possible. HOGE operations with external cargo should be flown heading into wind.","ECD strongly recommends restricting cargo-hook operations with persons to emergency situations only."]},{id:"ech-emergency",cat:"supplements",group:"External Cargo Hook · FMS 10-2",title:"Cargo Hook — Engine Failure / Load Jettison",kind:"procedure",ref:{src:"FM",loc:"FMS 10-2 §3 / §4 · p. 10-2-6…2-8",rev:"8"},lamps:[{caption:"HOOK",type:"caution"}],indications:["One engine fails while carrying an external load, or the load must be released in an emergency."],blocks:[{k:"note",t:"If one engine fails, the external load may have to be dumped. Refer to the single-engine performance diagrams, Section 5 of the basic Flight Manual."},{k:"phase",t:"Electrical Release (Normal)"},{k:"step",a:"Safety cover (CARGO HOOK REL. switch)",i:"Open"},{k:"step",a:"CARGO HOOK REL. switch (collective)",i:"Push forward — load releases when its mass overcomes the hook spring force"},{k:"warn",t:"Illumination of the HOOK caution light does not safely indicate that the cargo sling is detached from the hook."},{k:"phase",t:"Electrical Release Failure"},{k:"step",a:"Mechanical emergency release (foot-operated, RH door frame)",i:"Operate to release the load"}],notes:["HOOK caution light: illuminates while the cargo hook trails and no force greater than 50 N (5 kg) acts on the hook. The maximum trailing-unloaded airspeed of 70 kt must not be exceeded.","Opening the hook requires overcoming a spring force of approx. 50 N (5 kg); this force re-closes and locks the hook automatically."]},{id:"lrft-numbers",cat:"supplements",group:"Long Range Fuel Tank · FMS 10-3",title:"Long Range Fuel Tank — Numbers & Weights",kind:"keyvalue",ref:{src:"FM",loc:"FMS 10-3 §2 · p. 10-3-2…3-6",rev:"8"},pairs:[{k:"Usable fuel — per tank",v:"159.0 kg · 198.8 l"},{k:"Unusable fuel — per tank (cruise)",v:"1.0 kg · 1.2 l"},{k:"Total capacity — per tank",v:"160.0 kg · 200.0 l"},{k:"Capacity (US)",v:"52.8 US gal"},{k:"Fuel density basis",v:"0.8 kg/l"},{k:"Tank mass (empty, detachable portion)",v:"≈ 23 – 28.5 kg"}],notes:["Fuel transfer into the main tank is by gravity. Quantity is read on the main-tank indicator via the FUEL QTY-IND switch (LR TK-L / LR TK-R).","At low airspeed and/or extreme aft CG, unusable fuel rises to max 13.82 l (11.06 kg) per tank.","P/N 117-804381: two tanks may NOT be installed simultaneously. P/N 117-804401: two tanks permitted only when both are fixed in the most forward position. CG limits remain unchanged.","System switches LR FUEL TK L / R have positions EMER OP · OP · CL."]},{id:"lrft-emergency",cat:"supplements",group:"Long Range Fuel Tank · FMS 10-3",title:"Long Range Fuel Tank — Emergency / Malfunction",kind:"procedure",ref:{src:"FM",loc:"FMS 10-3 §3 · p. 10-3-3",rev:"8"},indications:["MN TK FREE indication does not come on although less than 200 kg is shown on the MN TANK FUEL QTY indicator, or an emergency landing is impending."],blocks:[{k:"phase",t:"MN TK FREE Indication Failure"},{k:"step",a:"Respective LR FUEL TK switch",i:"EMER OP (overrides the lock; valve opens immediately)"},{k:"phase",t:"Emergency Landing"},{k:"step",a:"Fuel",i:"Transfer as much as possible into the main tank"},{k:"warn",t:"In case of an emergency landing, set the respective LR FUEL TK switch to CL (close) prior to touchdown."}]},{id:"csas3-numbers",cat:"supplements",group:"3-Axis CSAS · FMS 10-32",title:"3-Axis CSAS — Numbers & Notes",kind:"keyvalue",ref:{src:"FM",loc:"FMS 10-32 · p. 10-32-1…32-7",rev:"1"},pairs:[{k:"System mass",v:"23.72 kg"},{k:"Arm (aft of datum)",v:"5100 mm"},{k:"Actuator authority (each axis)",v:"± 5%"},{k:"Part number",v:"117-88602 / 117-872701"}],notes:["Augments pitch, roll and yaw via the flight-control servo actuators; two independent subsystems (pitch/roll and yaw) on a common control panel.","All CSAS axes can be switched off simultaneously by the STABILIZATION CUTOFF pushbutton on the cyclic stick grip.","CG and limitations not contained in the supplement remain per the basic Flight Manual."]},{id:"csas3-pitchroll",cat:"supplements",group:"3-Axis CSAS · FMS 10-32",title:"3-Axis CSAS — PITCH / ROLL Caution",kind:"procedure",ref:{src:"FM",loc:"FMS 10-32 §3.1.1 · p. 10-32-2",rev:"1"},lamps:[{caption:"CSAS PITCH",type:"caution"},{caption:"CSAS ROLL",type:"caution"}],indications:["Malfunction of the respective CSAS axis","Change in respective axis control behavior"],blocks:[{k:"step",a:"Affected axis switch",i:"OFF"},{k:"note",t:"A pitch/roll axis failure might indicate a copilot's artificial-horizon malfunction. Check for the absence of a warning flag."}]},{id:"csas3-yaw",cat:"supplements",group:"3-Axis CSAS · FMS 10-32",title:"3-Axis CSAS — YAW Caution",kind:"procedure",ref:{src:"FM",loc:"FMS 10-32 §3.1 · p. 10-32-3",rev:"1"},lamps:[{caption:"CSAS YAW",type:"caution"}],indications:["Malfunction of the yaw axis","Change in yaw control behavior"],blocks:[{k:"warn",t:"Avoid hard and abrupt left/right pedal movements after pressing the STABILIZATION CUTOFF pushbutton."},{k:"note",t:"A yaw axis failure might indicate a pilot's artificial-horizon malfunction. Check for the absence of a warning flag."},{k:"step",a:"STABILIZATION CUTOFF pushbutton",i:"Press"},{k:"step",a:"PITCH and ROLL switches",i:"OFF, then ON"}]},{id:"csas3-runaway",cat:"supplements",group:"3-Axis CSAS · FMS 10-32",title:"3-Axis CSAS — Pitch/Roll Actuator Runaway",kind:"procedure",ref:{src:"FM",loc:"FMS 10-32 §3.2.1 · p. 10-32-3",rev:"1"},indications:["Sudden attitude change","Affected axis caution light comes on"],blocks:[{k:"note",t:"When operating near the ground, remain attentive — an actuator runaway could result in a loss of altitude."},{k:"step",a:"STABILIZATION CUTOFF pushbutton",i:"Press"},{k:"step",a:"Non-affected axes",i:"Reengage"},{k:"note",t:"The helicopter may yaw slightly when reengaging the yaw CSAS."}]},{id:"csasyaw-numbers",cat:"supplements",group:"Yaw CSAS · FMS 10-41",title:"Yaw CSAS — Notes",kind:"keyvalue",ref:{src:"FM",loc:"FMS 10-41 · p. 10-41-1",rev:"0"},pairs:[{k:"Part number",v:"117-88610"},{k:"Hydraulic supply",v:"System II"}],notes:["Improves control and dynamic stability around the yaw axis; eases directional control and reduces the effect of turbulence.","The Yaw CSAS can be switched off via the STABILIZATION CUTOFF pushbutton on the cyclic stick grip.","If hydraulic system I fails and an automatic changeover to system II occurs, the hydraulic supply to the yaw actuator is cut off and the Yaw CSAS becomes inoperative.","CG and limitations not contained in the supplement remain per the basic Flight Manual."]},{id:"csasyaw-caution",cat:"supplements",group:"Yaw CSAS · FMS 10-41",title:"Yaw CSAS — CSAS YAW Caution",kind:"procedure",ref:{src:"FM",loc:"FMS 10-41 §3.1.1 · p. 10-41-2",rev:"0"},lamps:[{caption:"CSAS YAW",type:"caution"}],indications:["Malfunction of the yaw axis","Change in yaw control behavior"],blocks:[{k:"warn",t:"Avoid hard and abrupt left/right pedal movements after pressing the STABILIZATION CUTOFF pushbutton."},{k:"note",t:"A yaw axis failure might indicate a pilot's artificial-horizon malfunction. Check for the absence of a warning flag."},{k:"step",a:"STABILIZATION CUTOFF pushbutton",i:"Press"}]},{id:"cata-limits",cat:"supplements",group:"Category A Operations · FMS 11-1",title:"Category A — Limitations",kind:"keyvalue",ref:{src:"FM",loc:"FMS 11-1 §A.2 / §B.2 · p. 11-1-4 / 11-1-13",rev:"8"},pairs:[{k:"Max altitude — takeoff & landing (Clear Heliport)",v:"13 000 ft DA"},{k:"Power check interval",v:"≤ 50 flying hours"},{k:"Tailwind takeoff / landing",v:"Prohibited"},{k:"Radar altimeter",v:"Required (operative)"},{k:"Upper gross mass limit",v:"3350 kg"}],notes:["Category A operations are prohibited if the power check is not satisfactory; a power-trend monitoring shall be established.","Category A takeoff and landing are prohibited with opened/removed doors (FMS 11-3). A cockpit door may be opened/held at low airspeed close to the ground to observe ground clearance before touchdown.","The radar altimeter is used to determine the heights of the takeoff and landing decision points (TDP / LDP)."]},{id:"cata-speeds",cat:"supplements",group:"Category A Operations · FMS 11-1",title:"Category A — Speeds & Decision Points",kind:"keyvalue",ref:{src:"FM",loc:"FMS 11-1 §A.1.3 · p. 11-1-3",rev:"8"},pairs:[{k:"VTOSS — takeoff safety speed",v:"50 KIAS"},{k:"VY — best rate of climb",v:"65 KIAS"},{k:"TDP (helipad / VTOL)",v:"140 ft AHE"},{k:"Takeoff flight path — 35 ft / VTOSS / +rate",v:"Segment I → 200 ft, Segment II → 1000 ft"},{k:"Max takeoff & landing gross mass",v:"Fig B1 (Clear) / Fig C1 (VTOL)"}],notes:["VTOSS assures ≥ 100 fpm rate of climb on 2.5-min power (OEI) at the max gross mass for the ambient condition.","Abbreviations: AHE abov he approach and safely land/stop."},{h:"Takeoff Decision Point (TDP)",p:"The point on the takeoff path at which the pilot decides whether to reject (before TDP) or continue (after TDP) the takeoff following an engine failure."},{h:"Landing Decision Point (LDP)",p:"The last point on the landing profile at which the height/airspeed combination permits the decision to continue the landing or to accelerate to VTOSS and climb away."},{h:"Takeoff Safety Speed (VTOSS)",p:"The airspeed assuring a steady climb of at least 100 fpm with 2.5-min power (OEI) at the max gross mass for the ambient condition. VTOSS = 50 KIAS."},{h:"Best Rate-of-climb Speed (VY)",p:"The airspeed giving the greatest gain in altitude in a given time. VY = 65 KIAS."}]},{id:"wl-xmsn-oil-press",cat:"emergencies",group:"Warning Lights",title:"XMSN OIL PRESS",kind:"procedure",ref:{src:"FM",loc:"§3.2.1 · p. 3-8",rev:"5A"},lamps:[{caption:"XMSN OIL PRESS",type:"warning"}],indications:["Transmission oil pressure below minimum","– Transmission oil pressure indication 1 bar or less"],blocks:[{k:"note",t:"XMSN OIL PRESS warning light may come on momentarily during extreme side slip, sidewards flight, crosswind hover or slope operations."},{k:"sub",t:"If one XMSN oil pressure indication is below minimum:"},{k:"step",a:"Power",i:"Reduce"},{k:"land",level:"practicable"},{k:"sub",t:"If both indications are below 1 bar:"},{k:"land",level:"immediately"},{k:"note",t:"Descend with minimum power."}]},{id:"wl-rotor-rpm",cat:"emergencies",group:"Warning Lights",title:"ROTOR RPM",kind:"procedure",ref:{src:"FM",loc:"§3.2.1 · p. 3-7",rev:"5A"},lamps:[{caption:"ROTOR RPM",type:"warning"}],indications:["NRo low — NRo 95% or less — Audio signal: steady tone","NRo high — NRo 106% or more — Audio signal: none"],blocks:[{k:"step",a:"Collective lever",i:"Adjust as necessary to maintain NRo within normal operating range"}]},{id:"wl-bat-disch",cat:"emergencies",group:"Warning Lights",title:"BAT DISCH",kind:"procedure",ref:{src:"FM",lo  mass of the helicopter.","Lowering or raising the collective lever will result in a left or right yawing motion to a degree dependent upon the tail rotor thrust remaining.","Approach and landing should be made with a suitable rate of descent, controlling sideslip angle with the collective lever. If the situation permits, a crosswind landing should be performed to minimize sideslip. Before touchdown, reduce groundspeed to a minimum and touch down with the skids aligned with the direction of landing.",{h:"Right pedal fixed-pitch setting",p:"Raising the collective lever results in a right yawing motion. Lower the collective lever to control sideslip and touch down with forward speed."},{h:"Left pedal fixed-pitch setting",p:"Lowering the collective lever results in a left yawing motion. Approach with a right sideslip and reduce ground speed to allow raising the collective lever as necessary to touchdown."}]},{id:"elec-bat-bus",cat:"emergencies",group:"Electrical / System",title:"Electrical Short Circuit — Battery Bus / Feeder Line",ref:{src:"FM",loc:"§3.6.2 · p. 3-62",rev:"5A"},kind:"procedure",lamps:[{caption:"BAT DISCH",type:"warning"}],indications:["– Short circuit on battery bus or battery feeder line","– Power supply interrupted to battery only","– Power supply guaranteed to all consumer busses by the generators","– BAT DISCH warning light on (prolonged or for short period)","– Both BUS-TIE switches OFF"],blocks:[{k:"sub",t:"If BAT DISCH warning light remains on:"},{k:"step",a:"PWR SELECT switch",i:"OFF"},{k:"step",a:"Ammeter and voltmeter",i:"Monitor"},{k:"land",level:"practicable"},{k:"note",t:"Emergency battery power will not be available."}]},{id:"fuel-valve",cat:"emergencies",group:"Electrical / System",title:"FUEL VALVE I / II",ref:{src:"FM",loc:"§3.2 · p. 3-25",rev:"5A"},kind:"procedure",lamps:[{caption:"FUEL VALVE I",type:"caution"},{caption:"FUEL VALVE II",type:"caution"}],indications:["Fuel valve is in a position other than commanded"],blocks:[{k:"note",  on the takeoff path at which the pilot decides whether to reject (before TDP) or continue (after TDP) the takeoff following an engine failure."},{h:"Landing Decision Point (LDP)",p:"The last point on the landing profile at which the height/airspeed combination permits the decision to continue the landing or to accelerate to VTOSS and climb away."},{h:"Takeoff Safety Speed (VTOSS)",p:"The airspeed assuring a steady climb of at least 100 fpm with 2.5-min power (OEI) at the max gross mass for the ambient condition. VTOSS = 50 KIAS."},{h:"Best Rate-of-climb Speed (VY)",p:"The airspeed giving the greatest gain in altitude in a given time. VY = 65 KIAS."}]},{id:"wl-xmsn-oil-press",cat:"emergencies",group:"Warning Lights",title:"XMSN OIL PRESS",ref:{src:"FM",loc:"§3.2.1 · p. 3-8",rev:"5A"},kind:"procedure",lamps:[{caption:"XMSN OIL PRESS",type:"warning"}],indications:["Transmission oil pressure below minimum","– Transmission oil pressure indication 1 bar or less"],blocks:[{k:"note",t:"XMSN OIL PRESS warning light may come on momentarily during extreme side slip, sidewards flight, crosswind hover or slope operations."},{k:"sub",t:"If one XMSN oil pressure indication is below minimum:"},{k:"step",a:"Power",i:"Reduce"},{k:"land",level:"practicable"},{k:"sub",t:"If both indications are below 1 bar:"},{k:"land",level:"immediately"},{k:"note",t:"Descend with minimum power."}]},{id:"wl-rotor-rpm",cat:"emergencies",group:"Warning Lights",title:"ROTOR RPM",ref:{src:"FM",loc:"§3.2.1 · p. 3-7",rev:"5A"},kind:"procedure",lamps:[{caption:"ROTOR RPM",type:"warning"}],indications:["NRo low — NRo 95% or less — Audio signal: steady tone","NRo high — NRo 106% or more — Audio signal: none"],blocks:[{k:"step",a:"Collective lever",i:"Adjust as necessary to maintain NRo within normal operating range"}]},{id:"wl-bat-disch",cat:"emergencies",group:"Warning Lights",title:"BAT DISCH",ref:{src:"FM",loc:"§3.2.1 · p. 3-4",rev:"5A"},kind:"procedure",lamps:[{caption:"BAT DISCH",type:"warning"}],indicat wer supply, both generators active.",sw:{pwrSel:"EXT",busTie1:"ON",busTie2:"ON",genI:"ON",genII:"ON",genTrip:"NORM"},world:{eng1:!0,eng2:!0,epu:!0},distribution:["With the switch position as described above, the external power relay is energized, thereby supplying EPU power to the battery bus bar and flight-essential bus bars. The Bus Tie relays no.1 and no.2 are energized, and power is supplied from the EPU to the main bus bars no.1 and no.2.","The external power interlock relays no.1 and no.2 closes the control circuit of the non-essential relay, which then permit power distribution from the no.2 main bus bar to the non-essential equipment."],extra:[["Generator Power","The starter/generators generate electrical power only with engine running. With an EPU connected to the helicopter and after engine start, generator power can not be distributed, because the external power interlock relays keeps both generator control units open. Setting the generator switches to the ON position has no effect."],["Battery Power","The battery is directly connected with the battery hot bus bar. As the battery relay is deenergized, no further distribution of battery power is possible."]],energized:["EPU","BATBUS","BATHOT","ESS1","ESS2","MAIN1","MAIN2","GEN1","GEN2","NONESS"],relays:{ext:!0,tie1:!0,tie2:!0,nonEss:!0},battery:"isolated"},{id:"f41",fig:"Fig.41",page:"9-41 / 9-42",title:"Parallel Generator Operation (Normal Flight Condition)",mode:"Normal parallel operation including battery charging. (Normal flight condition)",sw:{pwrSel:"BAT",busTie1:"ON",busTie2:"ON",genI:"ON",genII:"ON",genTrip:"NORM"},world:{eng1:!0,eng2:!0,epu:!1},distribution:["During normal generator operation, the generator control units close the control circuits of the corresponding generator relays. Generator power is supplied to both generator busbars and to the main bus bars.","Generator power is distributed to the flight essential bus bars through the diodes CR101, CR100, CR097 and CR098. As the Bus Tie relays no.1 and no.2 are energized, the electrical loads are shared between no.1 and no.2 generators.","The battery bus bar is connected with the Bus Tie relay and with the main bus bars. With the energized battery relay, generator power is distributed to the battery hot bus bar and for battery charging purposes.","The control circuit of the non-essential bus relay is closed by the energized generator failure relay no.1 and no.2 during normal operation. The non-essential bus bar is made alive."],energized:["GEN1","GEN2","MAIN1","MAIN2","ESS1","ESS2","BATBUS","BATHOT","NONESS","GENERATOR1","GENERATOR2"],relays:{gen1:!0,gen2:!0,tie1:!0,tie2:!0,battery:!0,nonEss:!0},battery:"charging"},{id:"f43",fig:"Fig.43",page:"9-43 / 9-44",title:"Single Generator Operation (No.1 Engine Inoperative)",mode:"After the 1st engine was started, main buses connected, battery switched on. Engine 1 inoperative.",sw:{pwrSel:"BAT",busTie1:"ON",busTie2:"ON",genI:"OFF",genII:"ON",genTrip:"NORM"},world:{eng1:!1,eng2:!0,epu:!1},distribution:["The no.2 generator control unit closes the control circuit of the no.2 generator relay. Power from the no.2 generator is supplied to the no.2 main bus bar and from there to the flight essential bus bars.","The no.1 main bus bar is supplied with electrical power from the no.2 main bus bar by the closed Bus Tie relays. The battery bus bar is supplied from main bus bar. With the battery relay closed, generator power is distributed to the battery hot bus bar and to the battery for charging purposes. The control circuit of the non-essential bus relay is opened by the deenergized generator failure relay no.1."],energized:["GEN1","GEN2","MAIN1","MAIN2","ESS1","ESS2","BATBUS","BATHOT","GENERATOR2"],relays:{gen2:!0,tie1:!0,tie2:!0,battery:!0},battery:"charging"},{id:"f45",fig:"Fig.45",page:"9-45 / 9-46",title:"Operation with both Generators (No.2 Main Bus Separated)",mode:"Normal operation with battery loading, main buses no.2 separated.",sw:{pwrSel:"BAT",busTie1:"ON",bu
